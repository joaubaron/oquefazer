<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Oquefazer</title>
<link rel="preload" as="image" href="fundo.jpg">
<link rel="icon" href="icone.png">
<link rel="apple-touch-icon" href="icone.png">
<link rel="manifest" href="manifest.json">
<style>
body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
background: url('fundo.jpg') center/cover no-repeat;
display: flex;
align-items: flex-end;
padding-bottom: 6.7vh;
justify-content: center;
height: 100vh;
box-sizing: border-box;
overflow-y: auto;
}
.container {
background: rgba(255, 255, 255, 0.85);
padding: 10px 30px;
border-radius: 25px;
box-shadow: 0 25px 60px rgba(0,0,0,0.25);
width: 90%;
max-width: 420px;
text-align: center;
}
h3 {
margin-bottom: 10px;
font-size: 22px;
color: #333;
}
.input-wrapper {
position: relative;
margin-bottom: 20px;
}
input {
width: 100%;
padding: 10px;
padding-right: 48px;
border-radius: 14px;
border: 1px solid #ddd;
font-size: 16px;
outline: none;
box-sizing: border-box;
}
input:focus {
border-color: #6eb233;
box-shadow: 0 0 0 3px rgba(110,179,51,0.2);
}
.geo-btn {
position: absolute;
right: 10px;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
cursor: pointer;
font-size: 22px;
padding: 0;
width: auto;
line-height: 1;
}
button {
width: 100%;
padding: 14px;
border: none;
border-radius: 14px;
font-size: 16px;
font-weight: bold;
cursor: pointer;
background: #6eb233;
color: white;
}
.btn-group {
display: flex;
gap: 8px;
margin-bottom: 0;
}
.btn-group button {
font-size: 13px;
padding: 7px 6px;
}
.cat-group {
display: flex;
gap: 6px;
margin-bottom: 10px;
}
.cat-btn {
flex: 1;
font-size: 12px;
padding: 6px 2px;
background: white;
color: #6eb233;
border: 1.5px solid #6eb233;
border-radius: 14px;
cursor: pointer;
font-weight: bold;
width: auto;
transition: background 0.2s ease, color 0.2s ease;
}
.cat-btn.ativo {
background: #6eb233;
color: white;
}
.cidade-row {
display: flex;
gap: 8px;
margin-bottom: 10px;
align-items: center;
}
.cidade-row .input-wrapper {
flex: 1;
margin-bottom: 0;
}
.evento-btn {
width: auto;
padding: 10px 12px;
font-size: 13px;
white-space: nowrap;
flex-shrink: 0;
background: white;
color: #6eb233;
border: 1.5px solid #6eb233;
transition: background 0.2s ease, color 0.2s ease;
}
.evento-btn.ativo {
background: #6eb233;
color: white;
}
.evento-wrapper {
margin-bottom: 10px;
display: none;
}
.evento-wrapper input {
padding-right: 14px;
}

/* PARCEIRO DA SEMANA */
.parceiro-card {
display: block;
background: linear-gradient(135deg, #f4fbed 0%, #edf7e0 100%);
border: 1.5px solid #a8d870;
border-radius: 14px;
padding: 10px 14px;
margin-bottom: 10px;
text-decoration: none;
overflow: hidden;
position: relative;
}
.parceiro-card::before {
content: '';
position: absolute;
top: 0; left: -60%;
width: 35%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
animation: shine 3.5s ease-in-out infinite;
}
@keyframes shine {
0% { left: -60%; }
65%, 100% { left: 120%; }
}
.parceiro-linha {
display: flex;
justify-content: space-between;
align-items: center;
}
.parceiro-label {
font-size: 10px;
color: #5a8a2a;
font-weight: 700;
letter-spacing: 0.4px;
text-transform: uppercase;
}
.parceiro-badge {
background: rgba(110,178,51,0.12);
color: #5a8a2a;
font-size: 8px;
font-weight: 700;
border-radius: 5px;
padding: 2px 6px;
letter-spacing: 0.5px;
text-transform: uppercase;
}
.parceiro-nome {
font-size: 13px;
font-weight: bold;
color: #1a2a0a;
}
.parceiro-acesse {
display: flex;
align-items: center;
gap: 4px;
font-size: 12px;
color: #6eb233;
font-weight: 700;
white-space: nowrap;
}
.parceiro-acesse svg {
width: 16px;
height: 16px;
}
</style>
</head>
<body>

<div id="splash" style="
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: #000000;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 9999;
transition: opacity 0.5s ease;
">
<img src="splash.png" style="width: 300px;">
</div>

<div class="container">
<h3>O que fazer perto de você?</h3>
<div>
  <div class="cidade-row">
    <div class="input-wrapper">
      <input type="text" id="cidade">
      <button type="button" class="geo-btn" onclick="detectarCidade()" title="Detectar minha cidade">🔍</button>
    </div>
    <button type="button" class="evento-btn" onclick="toggleEvento()">🎫 Evento</button>
  </div>
  <div class="evento-wrapper" id="eventoWrapper">
    <input type="text" id="evento" placeholder="Nome do evento ou artista">
  </div>
  <div class="cat-group">
    <button type="button" class="cat-btn" onclick="toggleCategoria(this, 'Bares')">🍻 Bares</button>
    <button type="button" class="cat-btn" onclick="toggleCategoria(this, 'Shows')">🎶 Shows</button>
    <button type="button" class="cat-btn" onclick="toggleCategoria(this, 'Cultura')">🎭 Cultura</button>
  </div>
  <div class="cat-group">
    <button type="button" class="cat-btn" onclick="toggleCategoria(this, 'Natureza')">🌱 Natureza</button>
    <button type="button" class="cat-btn" onclick="toggleCategoria(this, 'Esporte')">🎾 Esporte</button>
    <button type="button" class="cat-btn" onclick="toggleCategoria(this, 'Feiras')">🛍️ Feiras</button>
  </div>

  <!-- PARCEIRO DA SEMANA -->
  <a href="https://www.instagram.com/innaturacomidadeverdade?igsh=bzJlemN1cXBjOGY4" target="_blank" class="parceiro-card">
    <div class="parceiro-linha" style="margin-bottom:5px">
      <span class="parceiro-label">Parceiro do mês <span style="font-size:18px;">🍻</span></span>
      <span class="parceiro-badge">Patrocinado</span>
    </div>
    <div class="parceiro-linha">
      <span class="parceiro-nome">Inatura — Comida de Verdade</span>
      <span class="parceiro-acesse">
        Acesse
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          <defs>
            <radialGradient id="ig" cx="30%" cy="107%" r="150%">
              <stop offset="0%" stop-color="#fdf497"/>
              <stop offset="5%" stop-color="#fdf497"/>
              <stop offset="45%" stop-color="#fd5949"/>
              <stop offset="60%" stop-color="#d6249f"/>
              <stop offset="90%" stop-color="#285AEB"/>
            </radialGradient>
          </defs>
          <rect width="24" height="24" rx="6" fill="url(#ig)"/>
          <path d="M12 7.2C9.33 7.2 7.2 9.33 7.2 12C7.2 14.67 9.33 16.8 12 16.8C14.67 16.8 16.8 14.67 16.8 12C16.8 9.33 14.67 7.2 12 7.2ZM12 15.2C10.23 15.2 8.8 13.77 8.8 12C8.8 10.23 10.23 8.8 12 8.8C13.77 8.8 15.2 10.23 15.2 12C15.2 13.77 13.77 15.2 12 15.2Z" fill="white"/>
          <circle cx="17" cy="7" r="1.2" fill="white"/>
        </svg>
      </span>
    </div>
  </a>

  <div class="btn-group">
    <button type="button" onclick="buscar('hoje')" style="flex:1">Hoje</button>
    <button type="button" onclick="buscar('fimdesemana')" style="flex:2">Fim de semana</button>
    <button type="button" onclick="buscar('7dias')" style="flex:1">7 dias</button>
  </div>
  <p style="margin-top: 10px; font-size: 14px; color: #555;">
    Resultados podem variar a cada busca com IA
  </p>
  <p style="margin-top: 25px; font-size: 14px; color: #555;">
    <a href="https://www.instagram.com/joseaugustobaron/" target="_blank" style="color: #6eb233; text-decoration: none;">@joseaugustobaron</a>
    &nbsp;&nbsp;&nbsp;
    <a onclick="compartilhar(); return false;" href="#" style="color: #6eb233; text-decoration: none;">🔗 Indique o app</a>
  </p>
</div>
</div>

<!-- Modal -->
<div id="modal" onclick="if(event.target===this)this.style.display='none';" style="
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.6);
display: none;
align-items: center; justify-content: center;
z-index: 10000;
">
<div style="
background: white;
padding: 25px 20px;
border-radius: 20px;
text-align: center;
max-width: 300px;
box-shadow: 0 10px 30px rgba(0,0,0,0.25);
">
<p style="margin-bottom: 20px; font-size: 16px; color: #333;">
Por favor, digite uma cidade
</p>
<button onclick="document.getElementById('modal').style.display='none'; document.getElementById('cidade').focus();" style="
padding: 7px 14px;
border: none;
border-radius: 10px;
font-size: 13px;
font-weight: bold;
cursor: pointer;
background: #6eb233;
color: white;
width: auto;
">Entendi</button>
</div>
</div>

<script>
let categoriaSelecionada = '';

function toggleEvento() {
  const cats = document.querySelectorAll('.cat-btn');
  const wrapper = document.getElementById('eventoWrapper');
  const btn = document.querySelector('.evento-btn');
  if (wrapper.style.display === 'none' || wrapper.style.display === '') {
    wrapper.style.display = 'block';
    document.getElementById('evento').focus();
    btn.classList.add('ativo');
    cats.forEach(b => {
      b.classList.remove('ativo');
      b.disabled = true;
      b.style.opacity = '0.4';
      b.style.cursor = 'not-allowed';
    });
    categoriaSelecionada = '';
  } else {
    wrapper.style.display = 'none';
    document.getElementById('evento').value = '';
    btn.classList.remove('ativo');
    cats.forEach(b => {
      b.disabled = false;
      b.style.opacity = '1';
      b.style.cursor = 'pointer';
    });
  }
}

function toggleCategoria(btn, categoria) {
  const todos = document.querySelectorAll('.cat-btn');
  if (categoriaSelecionada === categoria) {
    btn.classList.remove('ativo');
    categoriaSelecionada = '';
  } else {
    todos.forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    categoriaSelecionada = categoria;
  }
}

function buscar(periodo) {
  const cidade = document.getElementById("cidade").value.trim();
  if (!cidade) {
    document.getElementById('modal').style.display = 'flex';
    return;
  }
  localStorage.setItem('cidade', cidade);
  let tempo;
  if (periodo === 'hoje') {
    tempo = 'hoje';
  } else if (periodo === 'fimdesemana') {
    tempo = 'neste fim de semana (sexta, sábado e domingo)';
  } else {
    tempo = 'nos próximos 7 dias a partir de hoje';
  }
  const eventoEspecifico = document.getElementById('evento').value.trim();
  let query;
  if (eventoEspecifico) {
    query = `Buscar APENAS informações sobre: ${eventoEspecifico} em ${cidade} ${tempo}. Mostrar somente este evento. Não mostrar outros eventos. Informar: data, horário, local, descrição e links. Se não encontrar, informar claramente que não há informações confirmadas sobre este evento.`;
  } else {
    const filtroCategoria = categoriaSelecionada ? ` Mostrar apenas eventos da categoria: ${categoriaSelecionada}.` : '';
    query = `Todos os eventos reais em ${cidade} ${tempo}, em ordem cronológica no formato 📆 calendário. Não invente eventos. Incluir eventos de todos os bairros da cidade, não apenas do centro. Incluir shows, cultura, gastronomia, restaurantes, bares, esportes, feiras, festivais, mercados, exposições, workshops. Apenas eventos com data confirmada. Para cada evento: data, horário, local e link. Para restaurantes: incluir especialidade. Categorias: 🍻 Bares, 🎶 Shows, 🎭 Cultura, 🌱 Natureza, 🎾 Esporte, 🛍️ Feiras. Para cada evento incluir pelo menos um link. Se houver mais, incluir todos: site oficial, Instagram, Sympla, Eventbrite ou site da prefeitura. Se não houver eventos confirmados, informar claramente que não há eventos oficiais encontrados.${filtroCategoria}`;
  }
  const url = "https://www.google.com/search?udm=50&hl=pt-BR&q=" + encodeURIComponent(query);
  location.href = url;
}

function detectarCidade() {
  if (!navigator.geolocation) {
    alert('Geolocalização não suportada neste dispositivo.');
    return;
  }
  const btn = document.querySelector('.geo-btn');
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
      const data = await res.json();
      const cidade = data.address.city || data.address.town || data.address.village || data.address.county;
      if (cidade) {
        document.getElementById('cidade').value = cidade;
        localStorage.setItem('cidade', cidade);
      }
    } catch(e) {
      alert('Não foi possível detectar a cidade.');
    } finally {
      btn.textContent = '🔍';
    }
  }, () => {
    alert('Permissão de localização negada.');
    btn.textContent = '🔍';
  });
}

function compartilhar() {
  const texto = 'O que fazer perto de você? 👉 https://joaubaron.github.io/oquefazer/';
  if (navigator.share) {
    navigator.share({ text: texto });
  } else {
    navigator.clipboard.writeText(texto).then(() => alert('Link copiado!'));
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const ultima = localStorage.getItem('cidade');
  document.getElementById('cidade').value = ultima || '';
  document.getElementById('cidade').placeholder = ultima ? '' : 'Digite sua cidade';
});

window.addEventListener('load', () => {
  const splash = document.getElementById('splash');
  if (sessionStorage.getItem('splashVisto')) {
    splash.remove();
  } else {
    sessionStorage.setItem('splashVisto', '1');
    setTimeout(() => {
      splash.style.opacity = '0';
      splash.style.pointerEvents = 'none';
      setTimeout(() => splash.remove(), 500);
    }, 2500);
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/oquefazer/sw.js');
}
</script>
</body>
</html>
