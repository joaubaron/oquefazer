/* PARCEIRO DO MÊS */
.parceiro-card {

border-radius: 14px;

margin-bottom: 7px;
text-decoration: none;
overflow: hidden;

}
.parceiro-card::before {

width: 35%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);

}
@keyframes shine {
0% { left: -60%; }
65%, 100% { left: 120%; }

<script>
let categoriaSelecionada = '';

function toggleEvento() {
const cats = document.querySelectorAll('.cat-btn');
const wrapper = document.getElementById('eventoWrapper');
const btn = document.querySelector('.evento-btn');
if (wrapper.style.display === 'none' || wrapper.style.display === '') {
wrapper.style.display = 'block';
document.getElementById('evento').focus();
btn.classList.add('ativo');
cats.forEach(b => {
b.classList.remove('ativo');
b.disabled = true;
b.style.opacity = '0.4';
b.style.cursor = 'not-allowed';
});
categoriaSelecionada = '';
} else {
wrapper.style.display = 'none';
document.getElementById('evento').value = '';
btn.classList.remove('ativo');
cats.forEach(b => {
b.disabled = false;
b.style.opacity = '1';
b.style.cursor = 'pointer';
});
}
}

function toggleCategoria(btn, categoria) {
const todos = document.querySelectorAll('.cat-btn');
if (categoriaSelecionada === categoria) {
btn.classList.remove('ativo');
categoriaSelecionada = '';
} else {
todos.forEach(b => b.classList.remove('ativo'));
btn.classList.add('ativo');
categoriaSelecionada = categoria;
}
}

function buscar(periodo) {
const cidade = document.getElementById("cidade").value.trim();
if (!cidade) {
document.getElementById('modal').style.display = 'flex';
return;
}
localStorage.setItem('cidade', cidade);
let tempo;
if (periodo === 'hoje') {
tempo = 'hoje';
} else if (periodo === 'fimdesemana') {
tempo = 'neste fim de semana (sexta, sábado e domingo)';
} else {
tempo = 'nos próximos 7 dias a partir de hoje';
}

const eventoEspecifico = document.getElementById('evento').value.trim();
let query;

if (eventoEspecifico) {
query = `Buscar APENAS informações sobre: ${eventoEspecifico} em ${cidade} ${tempo}. Mostrar somente este evento. Não mostrar outros eventos. Informar: data, horário, local, descrição e links. Se não encontrar, informar claramente que não há informações confirmadas sobre este evento.`;
} else {
const filtroCategoria = categoriaSelecionada ? ` Mostrar apenas eventos da categoria: ${categoriaSelecionada}.` : '';

// ── Lê o parceiro do mês dinamicamente do HTML ──
const parceiroMesNome = document.querySelector('.parceiro-nome')?.innerText || '';
const parceiroMesLabel = document.querySelector('.parceiro-label')?.firstChild?.textContent?.trim() || '';
const parceiroMesLink = document.querySelector('.parceiro-card')?.href || '';
const parceiroMesCidade = document.querySelector('.parceiro-cidade')?.innerText || '';

const destaquesTexto = `Antes de tudo, destaque o Parceiro do Mês: ${parceiroMesLabel} (${parceiroMesNome}), localizado em ${parceiroMesCidade}. Em 2 linhas máximo: descreva o que é o lugar e por que vale visitar. Use emojis. O link oficial do Instagram é ${parceiroMesLink} — exiba a URL completa clicável, não use texto âncora, não busque outros links. Em seguida liste os eventos normalmente. `;

query = `${destaquesTexto}Todos os eventos reais em ${cidade} ${tempo}, em ordem cronológica no formato 📆 calendário. Não invente eventos. Incluir eventos de todos os bairros da cidade, não apenas do centro. Incluir shows, cultura, gastronomia, restaurantes, bares, esportes, feiras, festivais, mercados, exposições, workshops. Apenas eventos com data confirmada. Para cada evento: data, horário, local e link. Para restaurantes: incluir especialidade. Categorias: 🍻 Bares, 🎶 Shows, 🎭 Cultura, 🌱 Natureza, 🎾 Esporte, 🛍️ Feiras. Para cada evento incluir pelo menos um link. Se houver mais, incluir todos: site oficial, Instagram, Sympla, Eventbrite ou site da prefeitura. Se não houver eventos confirmados, informar claramente que não há eventos oficiais encontrados.${filtroCategoria}`;
}

gtag('event', 'busca', { cidade, periodo, categoria: categoriaSelecionada || 'todas' });
const url = "https://www.google.com/search?udm=50&hl=pt-BR&q=" + encodeURIComponent(query);
setTimeout(() => { location.href = url; }, 300);
}

function mostrarAviso(msg) {
const m = document.getElementById('modal');
m.querySelector('p').textContent = msg;
m.style.display = 'flex';
}

function detectarCidade() {
if (!navigator.geolocation) {
mostrarAviso('Geolocalização não suportada neste dispositivo.');
return;
}
const btn = document.querySelector('.geo-btn');
btn.textContent = '⏳';
navigator.geolocation.getCurrentPosition(async (pos) => {
const { latitude, longitude } = pos.coords;
try {
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
const data = await res.json();
const cidade = data.address.city || data.address.town || data.address.village || data.address.county;
if (cidade) {
document.getElementById('cidade').value = cidade;
localStorage.setItem('cidade', cidade);
}
} catch(e) {
mostrarAviso('Não foi possível detectar a cidade.');
} finally {
btn.textContent = '🔍';
}
}, () => {
mostrarAviso('Permissão de localização negada.');
btn.textContent = '🔍';
});
}

function compartilhar() {
const texto = `Cansado de ficar em casa sem saber o que fazer? Isso acabou!
Tem um app que mostra shows, bares, feiras e eventos na sua cidade — usa seu GPS ou digita a cidade.
👉 https://t.ly/oquefazer

Dica: abre o link e toca em "Adicionar à tela inicial" para instalar como app.

Testa aí e passa pra frente!`;
if (navigator.share) {
navigator.share({ text: texto });
} else {
navigator.clipboard.writeText(texto).then(() => mostrarAviso('Link copiado! 🔗'));
}
}

window.addEventListener('DOMContentLoaded', () => {
const ultima = localStorage.getItem('cidade');
document.getElementById('cidade').value = ultima || '';
document.getElementById('cidade').placeholder = ultima ? '' : 'Digite sua cidade';
});

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('./sw.js', { scope: './' });
}

// ── Instalar app ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('instalar-banner').style.display = 'block';
});
document.getElementById('instalar-banner').addEventListener('click', async () => {
  document.getElementById('instalar-banner').style.display = 'none';
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  gtag('event', 'pwa_install', { outcome });
  deferredPrompt = null;
});
window.addEventListener('appinstalled', () => {
  document.getElementById('instalar-banner').style.display = 'none';
  gtag('event', 'pwa_installed');
});
</script>
