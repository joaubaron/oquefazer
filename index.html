<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Parceiro da Semana</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .phone {
    background: #f0f0f0;
    border-radius: 40px;
    padding: 16px;
    width: 360px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .screen {
    background: url('https://images.unsplash.com/photo-1514190051997-0f6f39ca5cde?w=400&q=80') center/cover;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
  }
  .screen-inner {
    background: rgba(0,0,0,0.35);
    padding: 16px 16px 20px;
    min-height: 580px;
    display: flex;
    align-items: flex-end;
  }
  .container {
    background: rgba(255,255,255,0.92);
    padding: 14px 18px;
    border-radius: 20px;
    width: 100%;
    backdrop-filter: blur(10px);
  }
  h3 {
    margin: 0 0 12px;
    font-size: 16px;
    color: #333;
    text-align: center;
  }
  .cidade-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .fake-input {
    flex: 1;
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 13px;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .evento-btn {
    background: white;
    border: 1.5px solid #6eb233;
    color: #6eb233;
    border-radius: 12px;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: bold;
    white-space: nowrap;
  }
  .cat-group {
    display: flex;
    gap: 5px;
    margin-bottom: 7px;
  }
  .cat-btn {
    flex: 1;
    font-size: 11px;
    padding: 5px 2px;
    background: white;
    color: #6eb233;
    border: 1.5px solid #6eb233;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
  }
  .cat-btn.ativo {
    background: #6eb233;
    color: white;
  }

  /* ===== BLOCO DO PARCEIRO ===== */
  .parceiro {
    display: block;
    background: linear-gradient(135deg, #fffbea 0%, #fff8d6 100%);
    border: 1.5px solid #e8c840;
    border-radius: 14px;
    padding: 10px 13px;
    margin-bottom: 8px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    animation: pulseGold 2.5s ease-in-out infinite;
  }
  @keyframes pulseGold {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,200,64,0.0); }
    50% { box-shadow: 0 0 0 4px rgba(232,200,64,0.25); }
  }
  .parceiro::before {
    content: '';
    position: absolute;
    top: 0; left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shine 3s ease-in-out infinite;
  }
  @keyframes shine {
    0% { left: -60%; }
    60%, 100% { left: 120%; }
  }
  .parceiro-label {
    font-size: 10px;
    color: #b08800;
    display: block;
    margin-bottom: 3px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .parceiro-nome {
    font-size: 13px;
    font-weight: bold;
    color: #2a2a2a;
    display: block;
    margin-bottom: 2px;
  }
  .parceiro-link {
    font-size: 11px;
    color: #6eb233;
    display: block;
    font-weight: 600;
  }
  /* ===== FIM BLOCO PARCEIRO ===== */

  .btn-group {
    display: flex;
    gap: 6px;
  }
  .btn-periodo {
    flex: 1;
    background: #6eb233;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 9px 4px;
    font-size: 11px;
    font-weight: bold;
    text-align: center;
  }
  .btn-periodo.mid { flex: 2; }

  .label-novo {
    background: #ff4757;
    color: white;
    font-size: 9px;
    font-weight: bold;
    border-radius: 6px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="screen-inner">
      <div class="container">
        <h3>O que fazer perto de você?</h3>

        <div class="cidade-row">
          <div class="fake-input">
            <span>Blumenau</span>
            <span>🔍</span>
          </div>
          <div class="evento-btn">🎫 Evento</div>
        </div>

        <div class="cat-group">
          <div class="cat-btn">🍻 Bares</div>
          <div class="cat-btn ativo">🎶 Shows</div>
          <div class="cat-btn">🎭 Cultura</div>
        </div>
        <div class="cat-group">
          <div class="cat-btn">🌱 Natureza</div>
          <div class="cat-btn">🎾 Esporte</div>
          <div class="cat-btn">🛍️ Feiras</div>
        </div>

        <!-- PARCEIRO DA SEMANA -->
        <a href="#" class="parceiro">
          <span class="parceiro-label">📢 Parceiro da semana <span class="label-novo">PATROCINADO</span></span>
          <span class="parceiro-nome">🍺 Bar do João — Happy hour 17h às 20h</span>
          <span class="parceiro-link">Ver no Instagram →</span>
        </a>

        <div class="btn-group">
          <div class="btn-periodo">Hoje</div>
          <div class="btn-periodo mid">Fim de semana</div>
          <div class="btn-periodo">7 dias</div>
        </div>

      </div>
    </div>
  </div>
</div>

</body>
</html>
