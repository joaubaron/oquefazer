<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Sem conexão – Oquefazer</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: url('fundo.jpg') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.card {
  background: rgba(255,255,255,0.88);
  border-radius: 25px;
  padding: 36px 30px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  margin-bottom: 30px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}
.emoji { font-size: 52px; margin-bottom: 16px; }
h2 { margin: 0 0 10px; color: #222; font-size: 20px; }
p  { color: #555; font-size: 15px; margin: 0 0 24px; line-height: 1.5; }
button {
  background: #6eb233;
  color: white;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">📡</div>
  <h2>Você está offline</h2>
  <p>Sem conexão no momento.<br>Verifique sua internet e tente novamente.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</div>
</body>
</html>
