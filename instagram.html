  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.45) 0%,
      rgba(0,10,30,0.6) 40%,
      rgba(0,0,0,0.85) 100%

  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 100px 70px 90px;
  }

  /* TOP */
  .top { display: flex; flex-direction: column; align-items: center; gap: 0; }

  .logo-wrap {
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.1);
    border: 3px solid rgba(255,255,255,0.25);
    border-radius: 44px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 60px rgba(80,200,80,0.4);
    margin-bottom: 36px;
  }
  .logo-wrap img { width: 140px; height: 140px; object-fit: contain; }

  .tag {
    background: linear-gradient(90deg, #3db843, #7ed957);
    color: white;
    font-size: 28px; font-weight: 900;
    letter-spacing: 5px; text-transform: uppercase;
    padding: 12px 40px; border-radius: 100px;
    margin-bottom: 44px;
    box-shadow: 0 8px 30px rgba(80,200,80,0.4);
  }

  /* MIDDLE */
  .middle { display: flex; flex-direction: column; align-items: center; }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 148px; line-height: 0.92;
    text-align: center; letter-spacing: 3px;
    color: white;
    text-shadow: 0 4px 40px rgba(0,0,0,0.6);
    margin-bottom: 30px;
  }
  .headline .hl {
    background: linear-gradient(90deg, #3db843, #ffcc00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 44px; font-weight: 700;
    color: rgba(255,255,255,0.85);
    text-align: center; line-height: 1.45;
    margin-bottom: 64px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
  }

  .pills {
    display: flex; flex-wrap: wrap;
    gap: 20px; justify-content: center;
    margin-bottom: 64px;
  }
  .pill {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    color: white; font-size: 34px; font-weight: 700;
    padding: 16px 36px; border-radius: 100px;
  }

  /* BOTTOM */
  .bottom { display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; }

  .cta-label {
    font-size: 34px; font-weight: 700;
    color: rgba(255,255,255,0.65);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 22px;
  }

  .cta-btn {
    background: linear-gradient(135deg, #3db843 0%, #7ed957 100%);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; letter-spacing: 6px;
    padding: 32px 100px; border-radius: 28px;
    box-shadow: 0 20px 60px rgba(60,180,60,0.5);
    margin-bottom: 22px;
  }

  .link {
    font-size: 38px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    margin-bottom: 30px;
  }

  .arrow {
    font-size: 80px;
    animation: bounce 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(255,220,0,0.7));
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(16px); }
  }
</style>
