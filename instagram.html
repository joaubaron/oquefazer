<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Nunito', sans-serif;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #0d0d0d 0%, #1a0533 40%, #0d1a33 100%);
  }

  .glow1 {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,60,120,0.35) 0%, transparent 70%);
    top: -100px; left: -150px;
    filter: blur(40px);
  }

  .glow2 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(60,120,255,0.3) 0%, transparent 70%);
    bottom: 200px; right: -100px;
    filter: blur(50px);
  }

  .glow3 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,0,0.2) 0%, transparent 70%);
    top: 800px; left: 300px;
    filter: blur(60px);
  }

  /* Grid dots */
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 70px;
    gap: 0;
  }

  .emoji-top {
    font-size: 110px;
    line-height: 1;
    margin-bottom: 40px;
    filter: drop-shadow(0 0 30px rgba(255,200,0,0.6));
  }

  .tag {
    background: linear-gradient(90deg, #ff3c78, #ff6b00);
    color: white;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 12px 36px;
    border-radius: 100px;
    margin-bottom: 50px;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 128px;
    line-height: 0.95;
    text-align: center;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 0 60px rgba(255,100,180,0.4);
    margin-bottom: 20px;
  }

  .headline span {
    background: linear-gradient(90deg, #ff3c78, #ffb700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 42px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 70px;
    max-width: 880px;
  }

  .card {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 36px;
    padding: 50px 60px;
    width: 100%;
    margin-bottom: 60px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 36px;
  }
  .feature:last-child { margin-bottom: 0; }

  .feat-icon {
    font-size: 52px;
    width: 80px;
    text-align: center;
    flex-shrink: 0;
  }

  .feat-text {
    font-size: 38px;
    font-weight: 700;
    color: white;
    line-height: 1.3;
  }

  .feat-text small {
    display: block;
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
  }

  .cta-box {
    width: 100%;
    text-align: center;
  }

  .cta-label {
    font-size: 36px;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff3c78 0%, #ff6b00 100%);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 68px;
    letter-spacing: 4px;
    padding: 28px 80px;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(255,60,120,0.45);
    margin-bottom: 24px;
  }

  .link {
    font-size: 36px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
  }

  .arrow {
    font-size: 90px;
    line-height: 1;
    animation: bounce 1.2s infinite;
    margin-top: 30px;
    filter: drop-shadow(0 0 20px rgba(255,183,0,0.7));
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(18px); }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="dots"></div>

  <div class="content">
    <div class="emoji-top">🔍</div>
    <div class="tag">O que fazer hoje?</div>

    <div class="headline">SEM IDEIA<br>DO QUE <span>FAZER?</span></div>

    <div class="subtitle">Shows, bares, feiras e eventos<br>perto de você — agora!</div>

    <div class="card">
      <div class="feature">
        <div class="feat-icon">📍</div>
        <div class="feat-text">Usa seu GPS
          <small>encontra eventos ao redor</small>
        </div>
      </div>
      <div class="feature">
        <div class="feat-icon">🏙️</div>
        <div class="feat-text">Qualquer cidade
          <small>é só digitar o nome</small>
        </div>
      </div>
      <div class="feature">
        <div class="feat-icon">📲</div>
        <div class="feat-text">Instala no celular
          <small>acesso rápido como app</small>
        </div>
      </div>
    </div>

    <div class="cta-box">
      <div class="cta-label">Acesse grátis 👇</div>
      <div class="cta-btn">ABRIR APP</div>
      <div class="link">t.ly/oquefazer</div>
    </div>

    <div class="arrow">👇</div>
  </div>
</body>
</html>
