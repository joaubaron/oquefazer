<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    position: relative;
  }

  .bg {
    position: absolute; inset: 0;
    background-image: url('artes/fundo.webp');
    background-size: cover;
    background-position: center top;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.00)  0%,
      rgba(0,0,0,0.10) 35%,
      rgba(0,0,0,0.55) 50%,
      rgba(0,0,0,0.80) 68%,
      rgba(0,0,0,0.93) 100%
    );
  }

  .content {
    position: absolute; z-index: 10;
    width: 100%;
    bottom: 240px;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 0 80px;
  }

  /* HEADLINE */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 158px;
    line-height: 0.90;
    text-align: center;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
    margin-bottom: 30px;
  }
  .headline .hl {
    color: #aadd00;
  }

  /* SUBTÍTULO */
  .subtitle {
    font-size: 40px;
    font-weight: 700;
    color: rgba(255,255,255,0.92);
    text-align: center;
    line-height: 1.45;
    text-shadow: 0 2px 18px rgba(0,0,0,0.8);
    margin-bottom: 48px;
  }

  /* PILLS */
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    margin-bottom: 80px;
  }
  .pill {
    background: rgba(15,15,25,0.62);
    border: 1.5px solid rgba(255,255,255,0.20);
    color: white;
    font-size: 28px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 100px;
  }

  /* ZONA DE LINK */
  .link-zone {
    margin-bottom: 80px;
    min-width: 600px;
    text-align: center;
  }
  .link-text {
    display: inline-block;
    font-size: 42px;
    font-weight: 900;
    color: rgba(255,255,255,0.70);
    letter-spacing: 1px;
    border-bottom: none;
    padding-bottom: 6px;
    outline: none;
    cursor: text;
    min-width: 400px;
  }
  .link-text:focus {
    color: white;
    border-bottom-color: #7ed957;
  }

  .edit-hint {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.6);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    padding: 8px 20px;
    border-radius: 50px;
    pointer-events: none;
    letter-spacing: 1px;
  }

  /* RODAPÉ CTA */
.cta-label {
  font-size: 32px;
  font-weight: 700;
  color: rgba(255,255,255,0.70);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
  margin-top: 40px;
}

  /* BOTÃO EXPORTAR */
  #btn-export {
    position: fixed;
    bottom: 30px; right: 30px;
    z-index: 9999;
    background: linear-gradient(135deg, #3db843, #7ed957);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 1px;
    padding: 16px 32px;
    border: none; border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(60,180,60,0.5);
    transition: transform 0.15s;
  }
  #btn-export:hover { transform: scale(1.05); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="edit-hint">✏️ Clique no link abaixo para editar antes de exportar</div>

  <div class="content">

    <div class="headline">SEM IDEIA<br>DO QUE <span class="hl">FAZER?</span></div>

    <div class="subtitle">Shows, bares, feiras e eventos<br>perto de você — agora!</div>

    <div class="pills">
      <div class="pill">📍 Usa GPS</div>
      <div class="pill">🌍 Qualquer cidade</div>
      <div class="pill">📱 Instala no celular</div>
    </div>

    <!-- ✏️ CLIQUE PARA EDITAR SEU LINK DO INSTAGRAM -->
    <div class="link-zone">
      <span class="link-text" contenteditable="true" spellcheck="false"></span>
    </div>

    <div class="cta-label">ACESSE GRÁTIS 👆 ABRA NO NAVEGADOR</div>

  </div>

  <button id="btn-export" onclick="exportarJPG()">📥 Exportar JPG</button>

  <script>
    function exportarJPG() {
      const btn = document.getElementById('btn-export');
      const hint = document.querySelector('.edit-hint');
      btn.style.display = 'none';
      hint.style.display = 'none';
      document.querySelector('.link-text').blur();

      html2canvas(document.body, {
        width: 1080,
        height: 1920,
        scale: 1,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'instagram.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
        btn.style.display = '';
        hint.style.display = '';
      });
    }
  </script>
</body>
</html>
